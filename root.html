<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Laravel</title>
        <link href="/resources/css/app.css" rel="stylesheet">
        <!-- Fallback: Tailwind CDN for development/viewing without building assets -->
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.5.3/dist/tailwind.min.css" rel="stylesheet">
    </head>
    <body class="bg-gray-100 min-h-screen">
        <nav class="bg-white shadow p-4">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <a href="/" class="font-semibold">Laravel</a>
                <div class="space-x-3">
                                            <a href="/login" class="text-sm">Login</a>
                        <a href="/register" class="text-sm">Register</a>
                                    </div>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4">
            <div class="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-semibold mb-4">Login</h2>
                <form method="POST" action="/login" class="space-y-4">
            <input type="hidden" name="_token" value="J7qgFjWrWp5ABtsHUoHoVzOd9jEytkccHLWPb4zW" autocomplete="off">            <div>
                <label class="block text-sm">Email</label>
                <input name="email" type="email" required class="mt-1 block w-full border p-2 rounded" value="">
            </div>
            <div>
                <label class="block text-sm">Password</label>
                <input name="password" type="password" required class="mt-1 block w-full border p-2 rounded">
            </div>
            <div class="flex items-center justify-between">
                <label class="text-sm"><input type="checkbox" name="remember"> Remember</label>
                <button class="bg-blue-600 text-white px-3 py-2 rounded">Login</button>
            </div>
        </form>
    </div>

    <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-semibold mb-4">Register</h2>
        <form method="POST" action="/register" class="space-y-4">
            <input type="hidden" name="_token" value="J7qgFjWrWp5ABtsHUoHoVzOd9jEytkccHLWPb4zW" autocomplete="off">            <div>
                <label class="block text-sm">Name</label>
                <input name="name" required class="mt-1 block w-full border p-2 rounded" value="">
            </div>
            <div>
                <label class="block text-sm">Email</label>
                <input name="email" type="email" required class="mt-1 block w-full border p-2 rounded" value="">
            </div>
            <div>
                <label class="block text-sm">Password</label>
                <input name="password" type="password" required class="mt-1 block w-full border p-2 rounded">
            </div>
            <div>
                <label class="block text-sm">Confirm Password</label>
                <input name="password_confirmation" type="password" required class="mt-1 block w-full border p-2 rounded">
            </div>
            <div class="flex justify-end">
                <button class="bg-green-600 text-white px-3 py-2 rounded">Register</button>
            </div>
        </form>
    </div>
</div>

        </main>
    </body>
</html>
