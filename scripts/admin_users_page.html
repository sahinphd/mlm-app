        <main class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">

    <h1 class="text-2xl font-semibold mb-4">Users</h1>

    <div class="bg-white rounded shadow p-4">
        <table id="usersTable" class="min-w-full divide-y" style="width:100%">
            <thead>
                <tr>
                    <th class="px-3 py-2 text-left">ID</th>
                    <th class="px-3 py-2 text-left">Name</th>
                    <th class="px-3 py-2 text-left">Email</th>

                </tr>

                <!-- data loaded via server-side AJAX -->
            </tbody>
        </table>

<!-- DataTables CDN -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
    $(document).ready(function(){
        const table = $('#usersTable').DataTable({
            serverSide: true,
            processing: true,
            ajax: {
                url: '/admin/users/data',
                type: 'GET'
            },
            pageLength: 25,
            order: [[0,'desc']],
            columns: [
                { data: 0 },
                { data: 1 },
                { data: 2 },
                { data: 3 },
                { data: 4 },
                { data: 5 },
                { data: 6, orderable: false, searchable: false }
            ]
        });

        // handle delete
        $('#usersTable').on('click', '.js-delete', function(e){
            e.preventDefault();
            const id = $(this).data('id');
            if (!confirm('Delete user #' + id + '? This cannot be undone.')) return;
            $.ajax({
                url: '/admin/users/' + id,
                method: 'POST',
                data: { _method: 'DELETE', _token: '2AqSXFcsFeiqWK480z5ei4wjaOhAKVl9Xg0vSGGr' },
                success(){ table.ajax.reload(); },
                error(){ alert('Delete failed'); }
            });
        });
    });
</script>

        </main>
      </div>
    </div>
    <script>
      (function(){
        const btn = document.getElementById('sidebarToggle');
        const aside = document.querySelector('aside');
        const overlay = document.getElementById('overlay');
        if (!btn || !aside) return;
        btn.addEventListener('click', ()=>{
          aside.classList.toggle('-translate-x-full');
          if (overlay) overlay.classList.toggle('hidden');
        });
        if (overlay) overlay.addEventListener('click', ()=>{
          aside.classList.add('-translate-x-full'); overlay.classList.add('hidden');
        });
      })();
    </script>
